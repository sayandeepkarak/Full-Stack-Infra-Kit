# TYPE  DATABASE        USER            ADDRESS                 METHOD

# Unix socket (required for postgres internals and local psql)
local   all             all                                     trust

# IPv4 local
host    all             all             127.0.0.1/32            md5

# IPv6 local
host    all             all             ::1/128                 md5

# Allow all app/container connections (Docker network)
host    all             all             0.0.0.0/0               md5

# Allow replication connections from any container (dev only)
host    replication     replicator      0.0.0.0/0               md5