services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres-primary
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
    ports:
      - "${DB_PORT}:${DB_PORT}"
    volumes:
      - postgres_data:/var/lib/postgresql/data:rw
      - ./docker/primary/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./docker/primary/pg_hba.conf:/etc/postgresql/pg_hba.conf
    command: >
      postgres -c wal_level=replica
               -c max_wal_senders=10
               -c max_replication_slots=10
               -c hba_file=/etc/postgresql/pg_hba.conf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_DATABASE}"]
      interval: 5s
      timeout: 5s
      retries: 10

  replica:
    image: postgres:16-alpine
    container_name: postgres-replica
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
    ports:
      - "${REPLICA_DB_PORT}:${DB_PORT}"
    volumes:
      - replica_data:/var/lib/postgresql/data
      - ./docker/replica/setup.sh:/setup.sh
    entrypoint: ["/bin/sh", "/setup.sh"]

  migration:
    build:
      context: ./database
      dockerfile: Dockerfile
    container_name: migration
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_DATABASE}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: api
    restart: always
    environment:
      API_PORT: ${API_PORT}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_DATABASE}
      REPLICA_DB_HOST: ${REPLICA_DB_HOST}
      REPLICA_DB_PORT: ${REPLICA_DB_PORT}
    expose:
      - "${API_PORT}"
    depends_on:
      migration:
        condition: service_completed_successfully

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: nginx
    restart: always
    ports:
      - "${NGINX_PORT}:${NGINX_FORWARD_PORT}"
    depends_on:
      api:
        condition: service_started
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf

  adminer:
    image: adminer:latest
    container_name: adminer_ui
    restart: always
    ports:
      - "${ADMINER_PORT}:${ADMINER_FORWARD_PORT}"
    environment:
      ADMINER_DEFAULT_SERVER: postgres-primary

volumes:
  postgres_data:
  replica_data:
